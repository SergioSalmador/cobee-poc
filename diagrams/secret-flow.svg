<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <rect width="1100" height="420" fill="#f8fafc"/>
  <style>
    .box { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:10; ry:10; }
    .title { font: 700 18px Arial, sans-serif; fill:#0f172a; }
    .txt { font: 14px Arial, sans-serif; fill:#0f172a; }
    .line { stroke:#334155; stroke-width:2; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="30" y="40" class="title">Secret Flow</text>

  <rect class="box" x="60" y="120" width="210" height="80"/><text x="95" y="165" class="txt">RDS (managed secret)</text>
  <rect class="box" x="340" y="120" width="210" height="80"/><text x="365" y="165" class="txt">Secrets Manager</text>
  <rect class="box" x="620" y="70" width="210" height="80"/><text x="675" y="115" class="txt">IRSA Role</text>
  <rect class="box" x="620" y="210" width="210" height="80"/><text x="655" y="255" class="txt">ExternalSecret</text>
  <rect class="box" x="900" y="210" width="170" height="80"/><text x="920" y="255" class="txt">K8s Secret</text>

  <line class="line" x1="270" y1="160" x2="340" y2="160"/>
  <line class="line" x1="550" y1="160" x2="620" y2="110"/>
  <line class="line" x1="550" y1="160" x2="620" y2="250"/>
  <line class="line" x1="830" y1="250" x2="900" y2="250"/>
</svg>
