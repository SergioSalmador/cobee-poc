<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f8fafc"/>
  <style>
    .title { font: 700 28px Arial, sans-serif; fill:#0f172a; }
    .subtitle { font: 600 16px Arial, sans-serif; fill:#334155; }
    .label { font: 14px Arial, sans-serif; fill:#0f172a; }
    .small { font: 12px Arial, sans-serif; fill:#334155; }
    .region { fill:#eef2ff; stroke:#1e3a8a; stroke-width:2; rx:14; ry:14; }
    .vpc { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:12; ry:12; }
    .public { fill:#e0f2fe; stroke:#0369a1; stroke-width:1.5; rx:10; ry:10; }
    .private { fill:#ecfccb; stroke:#4d7c0f; stroke-width:1.5; rx:10; ry:10; }
    .db { fill:#fee2e2; stroke:#b91c1c; stroke-width:1.5; rx:10; ry:10; }
    .line { stroke:#334155; stroke-width:2; marker-end:url(#arrow); }
    .dashed { stroke:#64748b; stroke-width:2; stroke-dasharray:6 4; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="30" y="46" class="title">Networking Diagram: Spain + Mexico</text>
  <text x="30" y="74" class="subtitle">Two isolated VPCs, each with public/private subnets, EKS and private RDS</text>

  <!-- Spain -->
  <rect class="region" x="40" y="110" width="740" height="740"/>
  <text x="60" y="145" class="subtitle">Region: EU (Spain)</text>

  <rect class="vpc" x="70" y="170" width="680" height="650"/>
  <text x="90" y="200" class="label">VPC ES (10.10.0.0/16)</text>

  <rect class="public" x="100" y="240" width="300" height="220"/>
  <text x="120" y="268" class="label">Public Subnets (AZ-a/b/c)</text>
  <rect class="vpc" x="130" y="300" width="110" height="50"/>
  <text x="150" y="332" class="small">ALB</text>
  <rect class="vpc" x="260" y="300" width="110" height="50"/>
  <text x="280" y="332" class="small">NAT GW</text>

  <rect class="private" x="420" y="240" width="300" height="220"/>
  <text x="440" y="268" class="label">Private Subnets (AZ-a/b/c)</text>
  <rect class="vpc" x="450" y="300" width="240" height="90"/>
  <text x="490" y="332" class="small">EKS Nodes + Pods</text>
  <text x="505" y="352" class="small">go-webapp</text>

  <rect class="db" x="220" y="520" width="380" height="220"/>
  <text x="240" y="548" class="label">RDS Subnets (private, Multi-AZ)</text>
  <rect class="vpc" x="270" y="590" width="280" height="90"/>
  <text x="305" y="628" class="small">RDS PostgreSQL (ES)</text>
  <text x="318" y="648" class="small">No public access</text>

  <text x="120" y="770" class="small">Internet -> ALB -> EKS -> RDS (private path)</text>

  <!-- Mexico -->
  <rect class="region" x="820" y="110" width="740" height="740"/>
  <text x="840" y="145" class="subtitle">Region: US East (Mexico traffic)</text>

  <rect class="vpc" x="850" y="170" width="680" height="650"/>
  <text x="870" y="200" class="label">VPC MX (10.20.0.0/16)</text>

  <rect class="public" x="880" y="240" width="300" height="220"/>
  <text x="900" y="268" class="label">Public Subnets (AZ-a/b/c)</text>
  <rect class="vpc" x="910" y="300" width="110" height="50"/>
  <text x="930" y="332" class="small">ALB</text>
  <rect class="vpc" x="1040" y="300" width="110" height="50"/>
  <text x="1060" y="332" class="small">NAT GW</text>

  <rect class="private" x="1200" y="240" width="300" height="220"/>
  <text x="1220" y="268" class="label">Private Subnets (AZ-a/b/c)</text>
  <rect class="vpc" x="1230" y="300" width="240" height="90"/>
  <text x="1270" y="332" class="small">EKS Nodes + Pods</text>
  <text x="1285" y="352" class="small">go-webapp</text>

  <rect class="db" x="1000" y="520" width="380" height="220"/>
  <text x="1020" y="548" class="label">RDS Subnets (private, Multi-AZ)</text>
  <rect class="vpc" x="1050" y="590" width="280" height="90"/>
  <text x="1085" y="628" class="small">RDS PostgreSQL (MX)</text>
  <text x="1098" y="648" class="small">No public access</text>

  <text x="900" y="770" class="small">Internet -> ALB -> EKS -> RDS (private path)</text>

  <!-- Flow arrows ES -->
  <line class="line" x1="240" y1="325" x2="450" y2="325"/>
  <line class="line" x1="540" y1="390" x2="430" y2="590"/>
  <line class="dashed" x1="315" y1="350" x2="315" y2="300"/>

  <!-- Flow arrows MX -->
  <line class="line" x1="1020" y1="325" x2="1230" y2="325"/>
  <line class="line" x1="1320" y1="390" x2="1210" y2="590"/>
  <line class="dashed" x1="1095" y1="350" x2="1095" y2="300"/>

  <!-- Isolation note -->
  <text x="620" y="880" class="subtitle">ES and MX networks are isolated. No direct cross-VPC traffic configured.</text>
</svg>
