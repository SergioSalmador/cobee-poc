<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <rect width="1500" height="980" fill="#f8fafc"/>
  <style>
    .title { font: 700 28px Arial, sans-serif; fill:#0f172a; }
    .sub { font: 600 16px Arial, sans-serif; fill:#334155; }
    .box { fill:#ffffff; stroke:#1f2937; stroke-width:1.6; rx:10; ry:10; }
    .env { fill:#e0f2fe; stroke:#0369a1; stroke-width:1.8; rx:10; ry:10; }
    .country { fill:#ecfccb; stroke:#4d7c0f; stroke-width:1.8; rx:10; ry:10; }
    .stack { fill:#fef3c7; stroke:#b45309; stroke-width:1.5; rx:8; ry:8; }
    .txt { font: 13px Arial, sans-serif; fill:#0f172a; }
    .line { stroke:#334155; stroke-width:1.6; }
  </style>

  <text x="30" y="45" class="title">Terraform Folder Structure</text>
  <text x="30" y="72" class="sub">Split by environment and country for isolation, reuse, and clear ownership</text>

  <rect class="box" x="60" y="110" width="220" height="50"/>
  <text x="125" y="141" class="txt">terraform/</text>

  <rect class="env" x="60" y="210" width="220" height="60"/>
  <text x="145" y="247" class="txt">dev/</text>
  <line class="line" x1="170" y1="160" x2="170" y2="210"/>

  <rect class="env" x="330" y="210" width="220" height="60"/>
  <text x="410" y="247" class="txt">prod/</text>
  <line class="line" x1="170" y1="160" x2="440" y2="160"/>
  <line class="line" x1="440" y1="160" x2="440" y2="210"/>

  <!-- dev countries -->
  <rect class="country" x="30" y="330" width="140" height="55"/>
  <text x="88" y="364" class="txt">es/</text>
  <rect class="country" x="190" y="330" width="140" height="55"/>
  <text x="248" y="364" class="txt">mx/</text>
  <line class="line" x1="170" y1="270" x2="170" y2="330"/>
  <line class="line" x1="100" y1="330" x2="250" y2="330"/>

  <!-- prod countries -->
  <rect class="country" x="300" y="330" width="140" height="55"/>
  <text x="358" y="364" class="txt">es/</text>
  <rect class="country" x="460" y="330" width="140" height="55"/>
  <text x="518" y="364" class="txt">mx/</text>
  <line class="line" x1="440" y1="270" x2="440" y2="330"/>
  <line class="line" x1="370" y1="330" x2="530" y2="330"/>

  <!-- stacks for each country column -->
  <g transform="translate(20,430)">
    <rect class="stack" x="0" y="0" width="155" height="48"/><text x="20" y="30" class="txt">networking/vpc/</text>
    <rect class="stack" x="0" y="58" width="155" height="48"/><text x="35" y="88" class="txt">eks/cluster/</text>
    <rect class="stack" x="0" y="116" width="155" height="48"/><text x="8" y="146" class="txt">eks/iam-roles-app/</text>
    <rect class="stack" x="0" y="174" width="155" height="48"/><text x="22" y="204" class="txt">rds/go-webapp/</text>
  </g>

  <g transform="translate(180,430)">
    <rect class="stack" x="0" y="0" width="155" height="48"/><text x="20" y="30" class="txt">networking/vpc/</text>
    <rect class="stack" x="0" y="58" width="155" height="48"/><text x="35" y="88" class="txt">eks/cluster/</text>
    <rect class="stack" x="0" y="116" width="155" height="48"/><text x="8" y="146" class="txt">eks/iam-roles-app/</text>
    <rect class="stack" x="0" y="174" width="155" height="48"/><text x="22" y="204" class="txt">rds/go-webapp/</text>
  </g>

  <g transform="translate(290,430)">
    <rect class="stack" x="0" y="0" width="155" height="48"/><text x="20" y="30" class="txt">networking/vpc/</text>
    <rect class="stack" x="0" y="58" width="155" height="48"/><text x="35" y="88" class="txt">eks/cluster/</text>
    <rect class="stack" x="0" y="116" width="155" height="48"/><text x="8" y="146" class="txt">eks/iam-roles-app/</text>
    <rect class="stack" x="0" y="174" width="155" height="48"/><text x="22" y="204" class="txt">rds/go-webapp/</text>
  </g>

  <g transform="translate(450,430)">
    <rect class="stack" x="0" y="0" width="155" height="48"/><text x="20" y="30" class="txt">networking/vpc/</text>
    <rect class="stack" x="0" y="58" width="155" height="48"/><text x="35" y="88" class="txt">eks/cluster/</text>
    <rect class="stack" x="0" y="116" width="155" height="48"/><text x="8" y="146" class="txt">eks/iam-roles-app/</text>
    <rect class="stack" x="0" y="174" width="155" height="48"/><text x="22" y="204" class="txt">rds/go-webapp/</text>
  </g>

  <text x="700" y="170" class="sub">Shared hierarchy files</text>
  <rect class="box" x="700" y="200" width="320" height="180"/>
  <text x="725" y="235" class="txt">terraform/root.hcl</text>
  <text x="725" y="265" class="txt">terraform/global.hcl</text>
  <text x="725" y="295" class="txt">terraform/dev/env.hcl</text>
  <text x="725" y="325" class="txt">terraform/prod/env.hcl</text>
  <text x="725" y="355" class="txt">country.hcl per country</text>

  <text x="700" y="450" class="sub">Why this split?</text>
  <rect class="box" x="700" y="480" width="730" height="260"/>
  <text x="725" y="520" class="txt">1) Environment isolation: dev and prod changes are separate.</text>
  <text x="725" y="555" class="txt">2) Country isolation: ES and MX resources and data paths are separate.</text>
  <text x="725" y="590" class="txt">3) Reuse: same stack pattern in every env/country.</text>
  <text x="725" y="625" class="txt">4) Clear operations: easier plan/apply per target folder.</text>
  <text x="725" y="660" class="txt">5) Better governance: country-level controls and residency support.</text>
</svg>
