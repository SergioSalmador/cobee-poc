<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <rect width="1200" height="340" fill="#f8fafc"/>
  <style>
    .box { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:10; ry:10; }
    .ok  { fill:#dcfce7; stroke:#16a34a; stroke-width:2; rx:10; ry:10; }
    .title { font: 700 18px Arial, sans-serif; fill:#0f172a; }
    .txt { font: 14px Arial, sans-serif; fill:#0f172a; }
    .line { stroke:#334155; stroke-width:2; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="30" y="40" class="title">Latency Budget (&lt; 100 ms)</text>

  <rect class="box" x="60" y="130" width="140" height="70"/><text x="100" y="170" class="txt">Client</text>
  <rect class="box" x="260" y="130" width="170" height="70"/><text x="292" y="160" class="txt">ALB</text><text x="292" y="180" class="txt">15-25 ms</text>
  <rect class="box" x="500" y="130" width="170" height="70"/><text x="532" y="160" class="txt">App</text><text x="532" y="180" class="txt">20-35 ms</text>
  <rect class="box" x="740" y="130" width="170" height="70"/><text x="772" y="160" class="txt">DB</text><text x="772" y="180" class="txt">15-30 ms</text>
  <rect class="ok" x="980" y="115" width="180" height="95"/><text x="1012" y="160" class="txt">Target</text><text x="1012" y="182" class="txt">Total &lt; 100 ms</text>

  <line class="line" x1="200" y1="165" x2="260" y2="165"/>
  <line class="line" x1="430" y1="165" x2="500" y2="165"/>
  <line class="line" x1="670" y1="165" x2="740" y2="165"/>
  <line class="line" x1="910" y1="165" x2="980" y2="165"/>
</svg>
