<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <rect width="1100" height="700" fill="#f8fafc"/>
  <style>
    .box { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:10; ry:10; }
    .title { font: 700 18px Arial, sans-serif; fill:#0f172a; }
    .txt { font: 14px Arial, sans-serif; fill:#0f172a; }
    .line { stroke:#334155; stroke-width:2; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="30" y="40" class="title">Architecture Overview</text>

  <rect class="box" x="80" y="80" width="180" height="60"/><text x="140" y="116" class="txt">Users</text>
  <rect class="box" x="330" y="80" width="230" height="60"/><text x="350" y="116" class="txt">AWS LB Controller</text>
  <rect class="box" x="640" y="80" width="180" height="60"/><text x="690" y="116" class="txt">ALB Ingress</text>
  <rect class="box" x="420" y="200" width="360" height="110"/>
  <text x="530" y="230" class="txt">EKS: go-webapp</text>
  <text x="455" y="255" class="txt">Deployment + Service + HPA + PDB</text>
  <text x="485" y="278" class="txt">ServiceAccount (IRSA)</text>

  <rect class="box" x="200" y="380" width="230" height="70"/><text x="235" y="422" class="txt">External Secrets</text>
  <rect class="box" x="500" y="380" width="260" height="70"/><text x="535" y="422" class="txt">AWS Secrets Manager</text>
  <rect class="box" x="830" y="380" width="220" height="90"/>
  <text x="860" y="418" class="txt">RDS PostgreSQL</text>
  <text x="865" y="440" class="txt">Multi-AZ (private)</text>

  <line class="line" x1="260" y1="110" x2="330" y2="110"/>
  <line class="line" x1="560" y1="110" x2="640" y2="110"/>
  <line class="line" x1="730" y1="140" x2="620" y2="200"/>
  <line class="line" x1="520" y1="310" x2="330" y2="380"/>
  <line class="line" x1="430" y1="420" x2="500" y2="420"/>
  <line class="line" x1="780" y1="420" x2="830" y2="420"/>
  <line class="line" x1="780" y1="250" x2="930" y2="380"/>
</svg>
