apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cobee-apps-dev
  namespace: argocd
spec:
  description: Root project for cobee-apps DEV
  sourceRepos:
    - '*'
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cobee-apps-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: cobee-apps
    app.kubernetes.io/part-of: cobee-apps-of-apps
    env: dev
spec:
  project: cobee-apps-dev
  source:
    repoURL: https://github.com/your-org/your-repo.git
    targetRevision: main
    path: k8s/argocd/dev
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - FailOnSharedResource=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
