apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-webapp.fullname" . }}-svc
  labels:
    {{- include "go-webapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "go-webapp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
