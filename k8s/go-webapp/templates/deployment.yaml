apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "go-webapp.fullname" . }}
  labels:
    {{- include "go-webapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "go-webapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "go-webapp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "go-webapp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "go-webapp.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "go-webapp.fullname" . }}-config
          {{- if .Values.externalSecrets.enabled }}
          env:
            - name: {{ .Values.externalSecrets.env.usernameVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "go-webapp.externalSecretTargetName" . }}
                  key: username
            - name: {{ .Values.externalSecrets.env.passwordVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "go-webapp.externalSecretTargetName" . }}
                  key: password
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
              scheme: {{ .Values.probes.readiness.scheme }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
              scheme: {{ .Values.probes.liveness.scheme }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
