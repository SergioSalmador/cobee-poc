nameOverride: ""
fullnameOverride: ""

replicaCount: 3

image:
  repository: go-webapp-sample
  tag: alpine
  pullPolicy: IfNotPresent

config:
  env:
    WEB_APP_ENV: "k8s"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

probes:
  readiness:
    path: /api/health
    scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  liveness:
    path: /api/health
    scheme: HTTP
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

serviceAccount:
  create: true
  name: ""
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/go-webapp-irsa-role

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/group.name: go-webapp
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  cpuAverageUtilization: 70
  memoryAverageUtilization: 75

pdb:
  enabled: true
  minAvailable: 2

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStore:
    create: true
    name: ""
    aws:
      service: SecretsManager
      region: eu-west-1
      role: ""
      serviceAccountRefName: ""
  targetSecret:
    name: ""
    creationPolicy: Owner
  data:
    username:
      remoteKey: /go-webapp/postgres
      property: username
    password:
      remoteKey: /go-webapp/postgres
      property: password
  env:
    usernameVar: POSTGRES_USERNAME
    passwordVar: POSTGRES_PASSWORD
